apiVersion: apps/v1
kind: Deployment
metadata: { name: pincheck, labels: { app: pincheck } }
spec:
  replicas: 1
  selector: { matchLabels: { app: pincheck } }
  template:
    metadata: { labels: { app: pincheck } }
    spec:
      containers:
        - name: pincheck
          image: ghcr.io/cognis-digital/pincheck:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: pincheck }
spec:
  selector: { app: pincheck }
  ports: [{ port: 80, targetPort: 8000 }]
